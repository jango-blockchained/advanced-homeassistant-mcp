name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# Required for GitHub Pages deployment with the official actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't queue runs that would race each other; cancel older runs
# for the same ref so the latest commit always wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: docs-site
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: docs-site
        env:
          # Public site URL (matches astro.config.mjs `site`)
          SITE_URL: https://jango-blockchained.github.io
        run: bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
