name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v1.0.0, v1.2.3, etc.
  # workflow_dispatch is required for the auto-release workflow
  # to dispatch this one via `gh workflow run release.yml` —
  # tag pushes from a workflow's GITHUB_TOKEN don't trigger
  # downstream workflow runs in the same repo (GitHub gotcha
  # to prevent infinite loops), so we dispatch explicitly.
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

# Dedupe concurrent runs for the same tag. The auto-release
# workflow fires release.yml twice in some cases (once from
# the tag push, once from the explicit `gh workflow run`
# dispatch). This concurrency group keeps the second run
# from racing the first; older runs cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Pin JavaScript actions to Node.js 24. Without this, actions
  # like actions/checkout@v4, softprops/action-gh-release@v2,
  # docker/* and the smmit/fastmcp SDK run on Node 20 and emit
  # deprecation warnings. September 16, 2026 is when Node 20
  # goes away entirely; setting this now avoids the eventual
  # breakage.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Job 1: Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Get package name from package.json
          PACKAGE_NAME=$(node -p "require('./package.json').name")

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog
          if [ -z "$PREV_TAG" ]; then
            # First release - limit to recent commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges --max-count=50)
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file for multiline output
          echo "$CHANGELOG" > changelog.txt

          # Create formatted release notes
          {
            echo "## Changes"
            echo ""
            cat changelog.txt
            echo ""
            echo "## Installation"
            echo ""
            echo "### npm"
            echo '```bash'
            echo "npm install -g ${PACKAGE_NAME}@${{ steps.get_version.outputs.version }}"
            echo '```'
            echo ""
            echo "### Docker"
            echo '```bash'
            echo "docker pull ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.version }}"
            echo '```'
          } > release_notes.txt

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Publish to npm
  # Skips with a warning if NPM_TOKEN isn't configured on the
  # repo. The rest of the release (GitHub release, Docker push,
  # README update) still succeeds — once the user adds NPM_TOKEN
  # under repo Settings > Secrets, the next release will publish
  # automatically.
  #
  # Note: the secret check happens at runtime in the step, not
  # via `if: ${{ secrets.X != '' }}` on each step. The reason
  # is that this workflow is also triggered via workflow_dispatch
  # (from auto-release.yml), and on dispatch triggers the
  # `secrets` context is NOT exposed to `if:` expressions
  # (GitHub returns HTTP 422 'Unrecognized named-value: secrets'
  # if you try). The runtime check via a `run:` step works on
  # both trigger types.
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build:all

      - name: Publish to npm (or skip if NPM_TOKEN not configured)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          TAG_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::npm publish skipped: NPM_TOKEN secret not configured on this repo."
            echo "## npm publish skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The \`NPM_TOKEN\` secret is not set on this repository." >> "$GITHUB_STEP_SUMMARY"
            echo "The rest of the release (GitHub release, Docker push, README update) still happened." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "To enable npm publish, add an \`NPM_TOKEN\` (Automation) token at:" >> "$GITHUB_STEP_SUMMARY"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Local one-off: \`NPM_TOKEN=xxx npm publish --access public\` from the repo root after a \`bun run build:all\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Verifying package version matches tag..."
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Package version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

          echo "Publishing to npm..."
          npm publish --access public

  # Job 3: Build and Push Docker Image
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add Docker pull command to release
        run: |
          echo "Docker image published: ghcr.io/${{ github.repository }}:${{ needs.create-release.outputs.version }}"
          echo "Pull with: docker pull ghcr.io/${{ github.repository }}:${{ needs.create-release.outputs.version }}"

  # Job 4: Update README badges and install commands to reflect
  # the new version. Runs in parallel with the npm and Docker
  # jobs. Commits the change back to main (a fast-forward
  # merge; the auto-release workflow's concurrency group keeps
  # it sane).
  update-readme:
    name: Update README version references
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update README
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail

          # 1. Refresh the "Available Docker tags" list to reflect
          #    the current major/minor. We keep the section
          #    dynamic-friendly by documenting the tag pattern
          #    rather than pinning a literal version.
          python3 - <<'PY'
          import re, pathlib, os
          p = pathlib.Path("README.md")
          text = p.read_text()
          new_block = (
              "**Available Docker tags:**\n"
              "\n"
              "- `latest` - Latest stable release\n"
              f"- `{os.environ['VERSION']}`, `{os.environ['VERSION'].rsplit('.', 1)[0]}`, "
              f"`{os.environ['VERSION'].split('.')[0]}` - Tagged versions\n"
              "- `dev` - Latest development build from main branch\n"
          )
          text, n = re.subn(
              r"\*\*Available Docker tags:\*\*\n\n"
              r"(?:- `.*\n)+",
              new_block,
              text,
              count=1,
          )
          assert n == 1, "Could not find 'Available Docker tags' block"
          p.write_text(text)
          PY

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit README update
        if: steps.diff.outputs.changed == 'true'
        run: |
          # The checkout is on the tag (detached HEAD) with no
          # local main branch ref. Create main from current HEAD
          # so the subsequent push has a valid src refspec.
          git checkout -B main
          git add README.md
          git commit -m "chore(release): update README for v${{ needs.create-release.outputs.version }}"
          git push origin main
