name: Auto Release

# Triggers on every push to main. Inspects the commit messages
# since the last release tag, decides whether a release should
# happen, and if so creates a tag. The existing `release.yml`
# then fires on the new tag to publish npm + Docker + GitHub
# release.
#
# Bump rules (Conventional Commits):
#   - BREAKING CHANGE in any commit body -> major
#   - feat: -> minor
#   - fix: -> patch
#   - chore:, docs:, ci:, style:, refactor:, test:, build:
#       -> no bump
#   - any other type (perf:, etc.) -> patch
#
# If no bump-worthy commit is found, this workflow exits
# silently without creating a tag.

on:
  push:
    branches: [main]

permissions:
  contents: write
  # Needed to dispatch the release.yml workflow from the
  # bump-and-tag step (see the [skip ci] rationale in that
  # step's comment: tag pushes from GITHUB_TOKEN in a workflow
  # run do not trigger downstream workflow runs, so we
  # explicitly call `gh workflow run`).
  actions: write

# Pin JavaScript actions to Node.js 24. Without this, the
# checkout/setup-node actions run on Node 20 and emit
# deprecation warnings (and will hard-fail September 16, 2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Avoid two auto-release runs racing. The older run wins on
# conflict (newer run cancels).
concurrency:
  group: auto-release
  cancel-in-progress: true

jobs:
  decide-and-bump:
    name: Decide bump and tag
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      bump: ${{ steps.decide.outputs.bump }}
      new_version: ${{ steps.decide.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decide bump from commits since last tag
        id: decide
        run: |
          set -euo pipefail

          # Find the most recent reachable v* tag. If none, treat
          # the entire history as the "since" set.
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi
          echo "Commit range: $RANGE"

          # Walk commits one at a time, checking the conventional
          # commit markers in the subject and body separately.
          # The previous version of this script dumped every
          # commit's body into a single string and regex-matched
          # against it, which meant a commit body that documents
          # the rules (and contains literal "feat(api)!:" or
          # "BREAKING CHANGE:" text) was misread as a real
          # breaking change. This version anchors the check to
          # the subject (must start at column 0 with a real
          # conventional-commit type) and the body footer (must
          # be at the start of a line per the CC spec).
          BUMP="none"
          HAS_COMMITS=0

          while IFS= read -r COMMIT_HASH; do
            # Skip empty lines (defensive).
            [ -z "$COMMIT_HASH" ] && continue
            HAS_COMMITS=1

            # Read subject and body for this commit, separated
            # by a NUL byte. `-z` on the read consumes the
            # terminator. The leading -n1 on the body read makes
            # sure we only get THIS commit's body, not the next.
            SUBJECT=$(git log -1 --format='%s' "$COMMIT_HASH")
            BODY=$(git log -1 --format='%b' "$COMMIT_HASH")

            # Skip our own release commits so a previous run's
            # bump doesn't get counted as a fresh source change.
            if echo "$SUBJECT" | grep -qE "^chore\(release\): bump version to "; then
              echo "Skipping own release commit: $COMMIT_HASH"
              continue
            fi

            echo "--- $COMMIT_HASH"
            echo "  Subject: $SUBJECT"
            if [ -n "$BODY" ]; then
              echo "  Body:    $BODY"
            fi

            # Major markers: subject with !, or body footer with
            # BREAKING CHANGE / BREAKING-CHANGE.
            if echo "$SUBJECT" | grep -qE "^[a-z]+(\([^)]+\))?!: "; then
              BUMP="major"
              echo "  -> major (subject !)"
              break
            fi
            if printf '%s\n' "$BODY" | grep -qE "^BREAKING[ -]CHANGE: "; then
              BUMP="major"
              echo "  -> major (body footer)"
              break
            fi

            # Track the highest non-major bump in the range.
            # Major wins over everything; minor wins over patch.
            if [ "$BUMP" = "none" ] || [ "$BUMP" = "patch" ]; then
              if echo "$SUBJECT" | grep -qE "^(feat|feat\([^)]+\)): "; then
                BUMP="minor"
                echo "  -> minor"
              elif echo "$SUBJECT" | grep -qE "^(fix|fix\([^)]+\)): "; then
                if [ "$BUMP" = "none" ]; then
                  BUMP="patch"
                  echo "  -> patch"
                fi
              elif echo "$SUBJECT" | grep -qE "^(perf|perf\([^)]+\)): "; then
                if [ "$BUMP" = "none" ]; then
                  BUMP="patch"
                  echo "  -> patch"
                fi
              fi
            fi
          done < <(git log "$RANGE" --format='%H')

          if [ "$HAS_COMMITS" = "0" ]; then
            BUMP="none"
          fi
          echo "======================="
          echo "Final BUMP: $BUMP"

          if [ "$BUMP" = "none" ]; then
            echo "No release-worthy commits. Skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Compute the new version from package.json + the bump.
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  bump-and-tag:
    name: Bump package.json and push tag
    needs: decide-and-bump
    if: needs.decide-and-bump.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        run: |
          NEW_VERSION="${{ needs.decide-and-bump.outputs.new_version }}"
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json')); pkg.version='$NEW_VERSION'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          echo "Bumped package.json to $NEW_VERSION"

      - name: Commit and push the bump
        run: |
          # The skip-CI trailer prevents the auto-release
          # workflow from re-firing on the bump commit's push
          # to main. Without it, the auto-release would run
          # again on the bump commit (only to no-op because
          # the decide step filters out the chore(release)
          # commit), wasting ~30s of CI.
          git add package.json
          git commit -m "chore(release): bump version to ${{ needs.decide-and-bump.outputs.new_version }}" \
                       -m "skip-auto-release" \
                       -m "ci-skip: no-op bump, decide step would no-op anyway"
          git push origin main

      - name: Create and push tag
        env:
          NEW_VERSION: ${{ needs.decide-and-bump.outputs.new_version }}
        run: |
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
          echo "Tagged and pushed v${NEW_VERSION}"

      - name: Trigger release.yml
        # release.yml listens for v*.*.* tag pushes, but tag
        # pushes from GITHUB_TOKEN in a workflow run do NOT
        # trigger downstream workflow runs in the same repo
        # (GitHub gotcha to prevent infinite loops). Explicitly
        # dispatch release.yml here so it actually runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.decide-and-bump.outputs.new_version }}
        run: |
          echo "Dispatching release.yml for v${NEW_VERSION}..."
          gh workflow run release.yml --ref "v${NEW_VERSION}"
          echo "Done. release.yml is now running."

      - name: Summary
        run: |
          {
            echo "## Auto-release triggered"
            echo ""
            echo "- Bump type: ${{ needs.decide-and-bump.outputs.bump }}"
            echo "- New version: v${{ needs.decide-and-bump.outputs.new_version }}"
            echo ""
            echo "The `release.yml` workflow will now handle the GitHub release, npm publish, and Docker push."
          } >> "$GITHUB_STEP_SUMMARY"
